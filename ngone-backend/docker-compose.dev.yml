version: '3.8'

services:
  api:
    build:
      context: .
      target: builder
    container_name: ngone-api-dev
    command: npx nodemon --experimental-specifier-resolution=node src/server.js
    ports:
      - "5000:5000"
      - "9229:9229"  # Node.js debugger
    env_file: .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://ngone:password@postgres:5432/ngone_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:delegated
      - ./prisma:/app/prisma:delegated
      - ./package.json:/app/package.json
      - /app/node_modules
    networks:
      - ngone-network

  postgres:
    image: postgres:15-alpine
    container_name: ngone-postgres-dev
    environment:
      POSTGRES_DB: ngone_db
      POSTGRES_USER: ngone
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngone -d ngone_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ngone-network

  redis:
    image: redis:7-alpine
    container_name: ngone-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redisdata-dev:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ngone-network

volumes:
  pgdata-dev:
    driver: local
  redisdata-dev:
    driver: local

networks:
  ngone-network:
    driver: bridge
